name: LLM Evaluation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic python-dotenv sentence-transformers pytest

      - name: Run evaluation suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -v --tb=short --json-report --json-report-file=eval_report.json
        continue-on-error: true

      - name: Generate eval report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/report_generator.py

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval_report.json
            eval_report.html